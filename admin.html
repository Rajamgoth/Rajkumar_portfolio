<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button.logout {
            padding: 8px 15px;
            background: red;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background: #2563eb;
        }

        tr:hover {
            background: #334155;
        }

        button.delete {
            background: crimson;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .center {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h1>📊 Admin Dashboard</h1>
        <button class="logout" onclick="logout()">Logout 🚪</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" class="center">Loading... ⏳</td></tr>
        </tbody>
    </table>

    <script>
        const token = localStorage.getItem("token");

        // ✅ CHECK TOKEN
        if (!token) {
            alert("Please login first 🔐");
            window.location.href = "admin-login.html";
        }

        const API = "https://portfolio-backend-yt3t.onrender.com/api/contact/messages";
        const table = document.getElementById("tableBody");

        // ✅ FETCH DATA
        fetch(API, {
            headers: {
                "Authorization": "Bearer " + token
            }
        })
            .then(res => {
                if (res.status === 401 || res.status === 403) {
                    throw new Error("Session expired");
                }
                return res.json();
            })
            .then(data => {

                table.innerHTML = ""; // clear loading

                // ✅ EMPTY STATE
                if (data.length === 0) {
                    table.innerHTML = `<tr><td colspan="5" class="center">No messages found 😔</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    const row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.message}</td>
                        <td>${item.createdAt || "N/A"}</td>
                        <td>
                            <button class="delete" onclick="deleteMessage(${item.id})">Delete</button>
                        </td>
                    </tr>
                `;
                    table.innerHTML += row;
                });
            })
            .catch(err => {
                console.error(err);
                alert("Session expired. Please login again 🔐");
                localStorage.removeItem("token");
                window.location.href = "admin-login.html";
            });

        // ✅ DELETE FUNCTION
        function deleteMessage(id) {

            if (!confirm("Are you sure?")) return;

            fetch(`${API}/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error("Delete failed");
                    }
                    return res.text();
                })
                .then(msg => {
                    alert(msg);
                    location.reload();
                })
                .catch(err => {
                    console.error(err);
                    alert("Error deleting message");
                });
        }

        // ✅ LOGOUT
        function logout() {
            localStorage.removeItem("token");
            window.location.href = "admin-login.html";
        }
    </script>

</body>

</html>
