<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background: #2563eb;
        }

        tr:hover {
            background: #334155;
        }
    </style>
</head>

<body>

<h1>📊 Admin Dashboard</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    fetch("https://portfolio-backend-yt3t.onrender.com/api/contact/messages")
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("tableBody");

            data.forEach(item => {
                let row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.message}</td>
                        <td>${item.createdAt || "N/A"}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        });
</script>

</body>
</html>
