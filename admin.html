<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e293b;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background: #2563eb;
        }

        tr:hover {
            background: #334155;
        }
    </style>
</head>

<body>

    <h1>📊 Admin Dashboard</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        fetch("https://portfolio-backend-yt3t.onrender.com/api/contact/messages")
            .then(res => res.json())
            .then(data => {
                let table = document.getElementById("tableBody");

                data.forEach(item => {
                    let row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.message}</td>
                        <td>${item.createdAt || "N/A"}</td>
                        <td>
                           <button onclick="deleteMessage(${item.id})">Delete</button>
                        </td>
                    </tr>
                `;
                    table.innerHTML += row;
                });
            });

        function deleteMessage(id) {

            console.log("Deleting ID:", id);

            if (!confirm("Are you sure?")) return;

            fetch(`https://portfolio-backend-yt3t.onrender.com/api/contact/messages/${id}`, {
                method: "DELETE"
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error("Delete failed");
                    }
                    return res.text();
                })
                .then(msg => {
                    alert(msg);
                    location.reload();
                })
                .catch(err => {
                    console.error(err);
                    alert("Error deleting message");
                });
        }
    </script>

</body>

</html>
